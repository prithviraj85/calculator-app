<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>


<div id="container">

<div class="cl"><h1>Calculator</h1></div>

<div id="calculator">
  
<div id="text">
<input type="text" placeholder="0">
</div>
<div id="number">

<div>
  <button value="x"  id="x" >x</button>
  <button class="operator" id="ac"   value="AC">AC</button>
  <button class="operator k" value="%">%</button>
  <button class="operator k" value="/">/</button>
</div>

<div >
  <button class="operator">7</button>
  <button class="operator">8</button>
  <button class="operator">9</button>
  <button class="operator">*</button>
</div>

<div >
  <button class="operator">4</button>
  <button class="operator">5</button>
  <button class="operator">6</button>
  <button  class="operator">-</button>
</div>

<div >
  <button class="operator">1</button>
  <button class="operator">2</button>
  <button class="operator">3</button>
  <button  class="operator">+</button>
</div>

<div>
  <button class="operator">00</button>
  <button class="operator">0</button>
  <button class="operator">.</button>
  <button id="click">=</button>
</div>


</div>

</div>

</div>


</body>
<script src="script.js"></script>
</html>
